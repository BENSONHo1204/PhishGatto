<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GattoBank - Account Verification</title>
    <style>
      :root{
        --bg:#020617;
        --card:#0b1220;
        --muted:#a1a1aa;
        --text:#e5e7eb;
        --accent:#facc15;
        --accent2:#fb7185;
        --border:rgba(255,255,255,.07);
      }
      *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
      body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg),#000);color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px}
      .panel{width:100%;max-width:920px;background:linear-gradient(180deg,var(--card),#060b16);border:1px solid var(--border);border-radius:18px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
      .top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}
      .brand{display:flex;align-items:center;gap:12px}
      .logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:900;color:#111827}
      h1{margin:8px 0 6px;font-size:26px}
      .hint{color:var(--muted);font-size:13px}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
      .box{background:#071726;border:1px solid var(--border);border-radius:14px;padding:16px}
      label{font-size:12px;color:var(--muted)}
      input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:rgba(2,6,23,.6);color:var(--text);outline:none;margin-top:6px}
      .btn{width:100%;margin-top:12px;padding:12px;border:0;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));font-weight:800;cursor:pointer}
      .btn:hover{filter:brightness(1.05)}
      .warn{font-size:12px;color:var(--muted);line-height:1.5}
      @media (max-width: 820px){.grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="top">
        <div class="brand">
          <div class="logo">GB</div>
          <div>
            <div class="hint">Official Portal</div>
            <div style="font-weight:800">GattoBank</div>
          </div>
        </div>
        <div class="hint">Security Check • 2 minutes</div>
      </div>


      <h1>Account Verification</h1>
      <div class="hint">Please confirm your details to continue using online services.</div>


      <div class="grid">
        <div class="box">
          <form action="/login" method="post">
            <div>
              <label>User ID</label>
              <input name="user" placeholder="Enter User ID" />
            </div>
            <div style="margin-top:10px">
              <label>Password</label>
              <input name="password" type="password" placeholder="Enter Password" />
            </div>
            <button class="btn" type="submit">Continue</button>
          </form>
        </div>


        <div class="box">
          <div style="font-weight:700;margin-bottom:8px">Important Notice</div>
          <div class="warn">
            If you received a message asking you to “verify immediately”, double-check the URL and do not share your credentials on unknown pages.
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
