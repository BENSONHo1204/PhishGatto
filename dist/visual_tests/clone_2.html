<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GattoBank Secure Login</title>
    <style>
      :root{
        --bg:#020617;
        --card:#0b1220;
        --muted:#94a3b8;
        --text:#e2e8f0;
        --accent:#22c55e;
        --accent2:#60a5fa;
        --border:rgba(255,255,255,.06);
      }
      *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
      body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg),#000);color:var(--text);padding:24px}
      .banner{max-width:980px;margin:0 auto 16px;background:#071726;border:1px solid var(--border);border-radius:14px;padding:12px 14px;color:var(--muted);font-size:13px}
      .wrap{max-width:980px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:18px}
      .panel{background:linear-gradient(180deg,var(--card),#060b16);border:1px solid var(--border);border-radius:18px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
      .brand{display:flex;align-items:center;gap:12px;margin-bottom:14px}
      .logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:900;color:#001018}
      h1{margin:8px 0 6px;font-size:28px}
      p{margin:0;color:var(--muted);line-height:1.5}
      .form{margin-top:16px;display:grid;gap:10px}
      label{font-size:12px;color:var(--muted)}
      input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:rgba(2,6,23,.65);color:var(--text);outline:none}
      .btn{margin-top:10px;padding:12px 14px;border-radius:12px;border:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#001018;font-weight:800;cursor:pointer}
      .btn:hover{filter:brightness(1.05)}
    </style>
  </head>
  <body>
    <div class="banner">
      Notice: We detected unusual activity. Please sign in to confirm your account status.
    </div>


    <div class="wrap">
      <section class="panel">
        <div class="brand">
          <div class="logo">GB</div>
          <div>
            <div style="font-size:12px;color:var(--muted)">Official Portal</div>
            <div style="font-weight:800">GattoBank</div>
          </div>
        </div>


        <h1>Secure Login</h1>
        <p>Sign in to continue.</p>


        <form class="form" action="/login" method="post">
          <div>
            <label>Email</label>
            <input name="email" placeholder="name@example.com" />
          </div>
          <div>
            <label>Password</label>
            <input name="password" type="password" placeholder="••••••••" />
          </div>
          <button class="btn" type="submit">Sign In</button>
        </form>
      </section>
    </div>
  </body>
</html>
